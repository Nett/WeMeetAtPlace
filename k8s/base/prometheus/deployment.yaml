apiVersion: apps/v1
kind: Deployment
metadata:
  name: wemeetatplace-prometheus
  labels:
    app: wemeetatplace-prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wemeetatplace-prometheus
  template:
    metadata:
      labels:
        app: wemeetatplace-prometheus
    spec:
      containers:
        - name: wemeetatplace-prometheus
          image: prom/prometheus:latest
          args:
            - --config.file=/etc/prometheus/prometheus.yml
            - --storage.tsdb.path=/prometheus
            - --web.enable-lifecycle
          ports:
            - containerPort: 9090
              name: web
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
            - name: data
              mountPath: /prometheus
          readinessProbe:
            httpGet:
              path: /-/ready
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /-/healthy
              port: 9090
            initialDelaySeconds: 15
            periodSeconds: 15
      volumes:
        - name: config
          configMap:
            name: wemeetatplace-prometheus-config
        - name: data
          persistentVolumeClaim:
            claimName: wemeetatplace-prometheus-data