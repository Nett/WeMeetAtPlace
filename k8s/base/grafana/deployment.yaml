apiVersion: apps/v1
kind: Deployment
metadata:
  name: wemeetatplace-grafana
  labels:
    app: wemeetatplace-grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: wemeetatplace-grafana
  template:
    metadata:
      labels:
        app: wemeetatplace-grafana
    spec:
      containers:
        - name: wemeetatplace-grafana
          image: grafana/grafana:latest
          ports:
            - containerPort: 3300
              name: web
          env:
            - name: GF_SERVER_HTTP_PORT
              value: "3300"
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: wemeetatplace-grafana-admin
                  key: GF_SECURITY_ADMIN_USER
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: wemeetatplace-grafana-admin
                  key: GF_SECURITY_ADMIN_PASSWORD
          volumeMounts:
            - name: wemeetatplace-grafana-data
              mountPath: /var/lib/grafana
            - name: wemeetatplace-grafana-datasources
              mountPath: /etc/grafana/provisioning/datasources
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3300
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3300
            initialDelaySeconds: 20
            periodSeconds: 20
      volumes:
        - name: wemeetatplace-grafana-data
          persistentVolumeClaim:
            claimName: wemeetatplace-grafana-data
        - name: wemeetatplace-grafana-datasources
          configMap:
            name: wemeetatplace-grafana-datasources