apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: wemeetatplace
spec:
  ingressClassName: nginx
  rules:
    - host: wemeetatplace.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: wemeetatplace-server
                port:
                  number: 80
