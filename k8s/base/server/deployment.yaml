apiVersion: apps/v1
kind: Deployment
metadata:
  name: wemeetatplace-server
  labels:
    app: wemeetatplace-server
spec:
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app: wemeetatplace-server
  template:
    metadata:
      labels:
        app: wemeetatplace-server
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: server
          image: ghcr.io/nett/wemeetatplace-server:latest
          imagePullPolicy: Always
          envFrom:
            - secretRef:
                name: wemeetatplace-postgres
          env:
            - name: K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: APPLICATION_NAME
              value: WeMeetAt.Place
            - name: NATS_URL
              value: nats://wemeetatplace-nats:4222
            - name: NODE_ENV
              value: production
          ports:
            - containerPort: 3000
