apiVersion: apps/v1
kind: Deployment
metadata:
  name: wemeetatplace-user
spec:
  replicas: 1
  template:
    spec:
      containers:
        - name: user
          imagePullPolicy: Always
          env:
            - name: K8S_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NATS_URL
              value: nats://wemeetatplace-nats:4222
            - name: NODE_ENV
              value: staging
