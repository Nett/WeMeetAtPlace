apiVersion: v1
kind: ConfigMap
metadata:
  name: wemeetatplace-prometheus-config
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: 'prometheus'
        static_configs:
          - targets:
              - 'localhost:9090'

      - job_name: 'nats'
        static_configs:
          - targets:
              - 'wemeetatplace-nats.staging.svc.cluster.local:7777'
