name: Build and Deploy

on:
  push:
    branches:
      - main
      - staging
      - feature/*

permissions:
  contents: read
  packages: write

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      server: ${{ steps.filter.outputs.server }}
      user: ${{ steps.filter.outputs.user }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            server:
              - 'apps/server/**'
              - 'libs/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig*.json'
              - 'nest-cli.json'

            user:
              - 'apps/user/**'
              - 'libs/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig*.json'
              - 'nest-cli.json'

  build:
    needs: changes
    runs-on: ubuntu-latest
    if: needs.changes.outputs.server == 'true' || needs.changes.outputs.user == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase owner
        id: owner
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set image tag
        id: tag
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          if [ "$BRANCH" = "main" ]; then
            PREFIX="main"
          elif [ "$BRANCH" = "staging" ]; then
            PREFIX="staging"
          else
            PREFIX="$(echo "$BRANCH" | tr '/' '-' | tr '[:upper:]' '[:lower:]')"
          fi
          echo "prefix=$PREFIX" >> "$GITHUB_OUTPUT"
          echo "value=${PREFIX}-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push server
        if: needs.changes.outputs.server == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/server/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/${{ steps.owner.outputs.value }}/wemeetatplace-server:${{ steps.tag.outputs.value }}

      - name: Build and push user
        if: needs.changes.outputs.user == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/user/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/${{ steps.owner.outputs.value }}/wemeetatplace-user:${{ steps.tag.outputs.value }}