name: Build and Deploy

on:
  push:
    branches:
      - main
      - staging
      - feature/*

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    outputs:
      image_tag: ${{ steps.tag.outputs.value }}
      image_prefix: ${{ steps.tag.outputs.prefix }}
      owner: ${{ steps.owner.outputs.value }}

    steps:
      - uses: actions/checkout@v4

      - name: Set lowercase owner
        id: owner
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set image tag
        id: tag
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          if [ "$BRANCH" = "main" ]; then
            PREFIX="main"
          elif [ "$BRANCH" = "staging" ]; then
            PREFIX="staging"
          else
            SAFE_BRANCH=$(echo "$BRANCH" | tr '/' '-' | tr '[:upper:]' '[:lower:]')
            PREFIX="$SAFE_BRANCH"
          fi

          echo "prefix=$PREFIX" >> "$GITHUB_OUTPUT"
          echo "value=${PREFIX}-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push server
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/server/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/${{ steps.owner.outputs.value }}/wemeetatplace-server:${{ steps.tag.outputs.value }}

      - name: Build and push user
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/user/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/${{ steps.owner.outputs.value }}/wemeetatplace-user:${{ steps.tag.outputs.value }}