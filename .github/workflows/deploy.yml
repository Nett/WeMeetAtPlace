name: Build and Deploy

on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push server
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/server/Dockerfile
          push: true
          tags: ghcr.io/nett/wemeetatplace-server:${{ steps.sha.outputs.short }}

      - name: Build and push user
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/user/Dockerfile
          push: true
          tags: ghcr.io/nett/wemeetatplace-user:${{ steps.sha.outputs.short }}

      - name: Install kustomize
        run: |
          curl -sSL https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh | bash
          sudo mv kustomize /usr/local/bin/

      - name: Update Kustomize image tags
        run: |
          cd k8s/overlays/staging/server
          kustomize edit set image ghcr.io/nett/wemeetatplace-server:${{ steps.sha.outputs.short }}

          cd ../user
          kustomize edit set image ghcr.io/nett/wemeetatplace-user:${{ steps.sha.outputs.short }}

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/overlays/staging/
          git diff --staged --quiet || git commit -m "chore: update image tags to ${{ steps.sha.outputs.short }}"
          git push