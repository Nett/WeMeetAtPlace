name: Cleanup old images

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  packages: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Cleanup server images
        uses: snok/container-retention-policy@v3.0.1
        with:
          account: nett
          image-names: "wemeetatplace-server"
          cut-off: 2d
          keep-n-most-recent: 3
          dry-run: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Cleanup user images
        uses: snok/container-retention-policy@v3.0.1
        with:
          account: nett
          image-names: "wemeetatplace-user"
          cut-off: 2d
          keep-n-most-recent: 3
          dry-run: true
          token: ${{ secrets.GITHUB_TOKEN }}